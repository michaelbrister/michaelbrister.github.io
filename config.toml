title = "Michael`:with Brister"
baseURL = "https://michaelbrister.github.io/"
theme = "hugo-resume"
languageCode = "en-us"
enableGitInfo = false

[params]
description = "Senior DevOps Engineer with 17+ years of experience in AWS, Terraform, CI/CD, and resilient cloud infrastructure."
address = "Remote, United States"
email = "mike@mikebrister.com"
favicon = "/img/profile.jpg"
firstName = "Mike"
lastName = "Brister"
phone = ""
profileImage = "img/profile.jpg"
showQr = false
showContact = true
showBoards = false
showCertifications = false
showSocializations = true
sections = ["skills", "experience"]
vcardfields = [
  "name",
  "image",
  "org",
  "email",
  "url",
  "title"
]

[[params.handles]]
name = "LinkedIn"
link = "https://www.linkedin.com/in/michael-brister-0929ab/"

[[params.handles]]
name = "GitHub"
link = "https://github.com/michaelbrister"

[[params.customSections]]
name = "Resume"
url = "/resume/"

[outputs]
home = ["HTML", "JSON"]

[taxonomies]
tag = "tags"

[mediaTypes]
  [mediaTypes."text/vcard"]
    suffixes = ["vcf"]

[outputFormats]
  [outputFormats.VCard]
    mediaType = "text/vcard"
    baseName = "contact"
    isPlainText = true
    notAlternative = true
