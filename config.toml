baseURL = "https://michaelbrister.github.io/"
languageCode = "en-us"
title = "Mike Brister"
theme = "hugo-profile"
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  title = "Mike Brister"
  description = "Personal website and professional profile of Mike Brister."
  favicon = "/fav.png"
  useBootstrapCDN = false
  mathjax = false
  animate = true

  [params.theme]
    defaultTheme = "light"
    disableThemeToggle = false

  [params.navbar]
    brandName = "Mike Brister"
    disableSearch = true

    [params.navbar.stickyNavBar]
      enable = true
      showOnScrollUp = true

    [params.navbar.menus]
      disableAbout = false
      disableExperience = false
      disableEducation = true
      disableProjects = false
      disableAchievements = true
      disableContact = false

  [params.hero]
    enable = true
    intro = "Hi, my name is"
    title = "Mike Brister"
    subtitle = "I build reliable software systems"
    content = "I design and deliver practical backend and cloud solutions that are maintainable, testable, and aligned with business goals."
    image = "/hero.svg"

    [params.hero.bottomImage]
      enable = true

    [params.hero.button]
      enable = true
      name = "Contact Me"
      url = "#contact"
      download = false
      newPage = false

    [params.hero.socialLinks]
      [[params.hero.socialLinks.fontAwesomeIcons]]
        icon = "fab fa-github"
        url = "https://github.com/michaelbrister"
      [[params.hero.socialLinks.fontAwesomeIcons]]
        icon = "fab fa-linkedin"
        url = "https://linkedin.com/in/michaelbrister"

  [params.about]
    enable = true
    title = "About Me"
    content = "I am a software engineer focused on building dependable applications and improving developer workflows. I enjoy turning requirements into production-ready systems and collaborating across teams to ship high-quality outcomes."

    [params.about.skills]
      enable = true
      title = "Core skills"
      items = [
        "Backend Development",
        "API Design",
        "Cloud Infrastructure",
        "CI/CD Automation",
        "Data Modeling",
        "Observability"
      ]

  [params.experience]
    enable = true
    [[params.experience.items]]
      company = "Current Role"
      companyUrl = "https://github.com/michaelbrister"
      [[params.experience.items.jobs]]
        name = "Software Engineer"
        date = "Recent"
        content = "Building and maintaining production services, improving release workflows, and partnering with stakeholders to deliver reliable software."

  [params.projects]
    enable = true
    [[params.projects.items]]
      title = "Project 1"
      content = "Short summary of impact, tech stack, and your role."
      image = "/project-placeholder.jpg"
      badges = ["Backend", "Cloud"]
      [params.projects.items.featured]
        name = "GitHub"
        link = "https://github.com/michaelbrister"
    [[params.projects.items]]
      title = "Project 2"
      content = "Short summary of impact, tech stack, and your role."
      image = "/project-placeholder.jpg"
      badges = ["Automation", "DevOps"]
      [params.projects.items.featured]
        name = "GitHub"
        link = "https://github.com/michaelbrister"

  [params.contact]
    enable = true
    content = "My inbox is open for opportunities, collaboration, or a quick intro."
    btnName = "Email me"
    btnLink = "mailto:you@example.com"

  [params.footer]
    [params.footer.recentPosts]
      enable = false

    [params.footer.socialNetworks]
      github = "https://github.com/michaelbrister"
      linkedin = "https://linkedin.com/in/michaelbrister"
